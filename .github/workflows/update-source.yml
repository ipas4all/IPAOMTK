name: Update source JSON

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      inspect_ipa:
        description: "Range-read IPA Info.plist files for real bundle identifiers"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: update-source-json
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build source JSON
        run: |
          if [ "${{ github.event.inputs.inspect_ipa }}" = "true" ]; then
            go run . -inspect-ipa -out ipaomtk-source.json
          else
            go run . -out ipaomtk-source.json
          fi

      - name: Commit source JSON
        run: |
          if git diff --quiet -- ipaomtk-source.json; then
            echo "No source changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add ipaomtk-source.json
          git commit -m "Update IPAOMTK source"
          git push
